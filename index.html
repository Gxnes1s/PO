```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<title>Excel Cloud Realtime</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:system-ui;
}

body{
  background:#f5f7fb;
  padding:20px;
  color:#111827;
}

.container{
  max-width:1400px;
  margin:auto;
}

.card{
  background:white;
  border-radius:18px;
  padding:20px;
  box-shadow:0 4px 20px rgba(0,0,0,.06);
}

.title{
  font-size:28px;
  font-weight:800;
  margin-bottom:8px;
}

.subtitle{
  color:#6b7280;
  margin-bottom:20px;
}

.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.input,
.select{
  padding:12px 14px;
  border:1px solid #d1d5db;
  border-radius:12px;
  font-size:14px;
}

.input{
  flex:1;
  min-width:280px;
}

.select{
  min-width:220px;
}

.btn{
  border:none;
  padding:12px 16px;
  border-radius:12px;
  cursor:pointer;
  font-weight:700;
  transition:.2s;
}

.btn-primary{
  background:#111827;
  color:white;
}

.btn-success{
  background:#16a34a;
  color:white;
}

.btn-danger{
  background:#dc2626;
  color:white;
}

.btn:hover{
  transform:translateY(-1px);
}

.quick{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}

.quick button{
  border:none;
  background:#eef2ff;
  color:#3730a3;
  padding:10px 12px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

.quick button:hover{
  background:#dbeafe;
}

.info{
  margin-top:12px;
  color:#6b7280;
  font-size:13px;
}

.table-wrap{
  overflow:auto;
  margin-top:20px;
  border:1px solid #e5e7eb;
  border-radius:14px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th{
  background:#111827;
  color:white;
  padding:12px;
  text-align:left;
  font-size:14px;
  position:sticky;
  top:0;
}

td{
  padding:10px 12px;
  border-top:1px solid #e5e7eb;
  font-size:14px;
}

tr:hover td{
  background:#f9fafb;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
  margin-top:20px;
}

.stat-card{
  background:white;
  border-radius:16px;
  padding:18px;
  box-shadow:0 4px 20px rgba(0,0,0,.05);
}

.stat-title{
  color:#6b7280;
  font-size:13px;
  margin-bottom:6px;
}

.stat-value{
  font-size:26px;
  font-weight:800;
}

.loading{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99999;
}

.loading-box{
  background:white;
  padding:24px;
  border-radius:18px;
  font-size:16px;
  font-weight:700;
}

</style>
</head>

<body>

<div class="container">

  <div class="card">

    <div class="title">
      ☁️ Excel Cloud Realtime
    </div>

    <div class="subtitle">
      โหลดข้อมูลจาก Google Sheets / OneDrive / Dropbox / XLSX URL / API ได้ทันที
    </div>

    <div class="toolbar">

      <select
        id="cloudSource"
        class="select"
      >

        <option value="google">
          Google Sheets
        </option>

        <option value="onedrive">
          OneDrive / SharePoint
        </option>

        <option value="dropbox">
          Dropbox
        </option>

        <option value="direct">
          Direct XLSX URL
        </option>

        <option value="excelcloud">
          Excel Cloud API
        </option>

      </select>

      <input
        type="text"
        id="cloudExcelUrl"
        class="input"
        placeholder="วางลิงก์หรือ API URL"
      >

      <button
        class="btn btn-primary"
        onclick="loadCloudExcel()"
      >
        ⚡ โหลดข้อมูล
      </button>

      <button
        class="btn btn-success"
        onclick="exportExcel()"
      >
        ⬇ Export Excel
      </button>

      <button
        class="btn btn-danger"
        onclick="clearData()"
      >
        🗑 ล้างข้อมูล
      </button>

    </div>

    <div class="quick">

      <button onclick="quickCloud('google')">
        Google
      </button>

      <button onclick="quickCloud('onedrive')">
        OneDrive
      </button>

      <button onclick="quickCloud('dropbox')">
        Dropbox
      </button>

      <button onclick="quickCloud('direct')">
        XLSX URL
      </button>

      <button onclick="quickCloud('excelcloud')">
        API
      </button>

    </div>

    <div class="info">
      รองรับหลาย Sheet / JSON API / Auto Detect Columns / Save LocalStorage
    </div>

  </div>

  <div class="stats">

    <div class="stat-card">
      <div class="stat-title">
        จำนวนแถว
      </div>
      <div class="stat-value" id="rowCount">
        0
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-title">
        จำนวนคอลัมน์
      </div>
      <div class="stat-value" id="colCount">
        0
      </div>
    </div>

  </div>

  <div class="table-wrap">
    <table id="excelTable"></table>
  </div>

</div>

<script>

/* =========================
STORE
========================= */

const store = {
  rows: [],
  headers: []
};

/* =========================
HELPERS
========================= */

function quickCloud(type){

  document.getElementById('cloudSource').value = type;
}

function showLoading(text='กำลังโหลด...'){

  const div = document.createElement('div');

  div.className = 'loading';

  div.id = 'loadingLayer';

  div.innerHTML = `
    <div class="loading-box">
      ${text}
    </div>
  `;

  document.body.appendChild(div);
}

function hideLoading(){

  const el = document.getElementById('loadingLayer');

  if(el){
    el.remove();
  }
}

/* =========================
SAVE
========================= */

function saveData(){

  localStorage.setItem(
    'excel_cloud_rows',
    JSON.stringify(store.rows)
  );

  localStorage.setItem(
    'excel_cloud_headers',
    JSON.stringify(store.headers)
  );
}

/* =========================
LOAD SAVE
========================= */

function loadSaved(){

  const rows =
    localStorage.getItem('excel_cloud_rows');

  const headers =
    localStorage.getItem('excel_cloud_headers');

  if(rows){

    store.rows = JSON.parse(rows);
  }

  if(headers){

    store.headers = JSON.parse(headers);
  }

  renderTable();
}

/* =========================
RENDER TABLE
========================= */

function renderTable(){

  const table =
    document.getElementById('excelTable');

  table.innerHTML = '';

  document.getElementById('rowCount')
    .innerText = store.rows.length;

  document.getElementById('colCount')
    .innerText = store.headers.length;

  if(!store.rows.length){

    table.innerHTML = `
      <tr>
        <td style="
          padding:40px;
          text-align:center;
          color:#6b7280;
        ">
          ไม่มีข้อมูล
        </td>
      </tr>
    `;

    return;
  }

  const thead = document.createElement('thead');

  const hr = document.createElement('tr');

  store.headers.forEach(h=>{

    const th = document.createElement('th');

    th.innerText = h;

    hr.appendChild(th);
  });

  thead.appendChild(hr);

  table.appendChild(thead);

  const tbody = document.createElement('tbody');

  store.rows.forEach(r=>{

    const tr = document.createElement('tr');

    store.headers.forEach(h=>{

      const td = document.createElement('td');

      td.innerText = r[h] ?? '';

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
}

/* =========================
LOAD CLOUD
========================= */

async function loadCloudExcel(){

  let url =
    document.getElementById('cloudExcelUrl')
    .value
    .trim();

  const source =
    document.getElementById('cloudSource')
    .value;

  if(!url){

    alert('กรุณาใส่ลิงก์');

    return;
  }

  try{

    showLoading(
      'กำลังโหลดข้อมูลจาก Cloud...'
    );

    /* =========================
    GOOGLE SHEETS
    ========================= */

    if(source === 'google'){

      const match =
        url.match(/\/d\/([a-zA-Z0-9-_]+)/);

      if(match){

        url =
        `https://docs.google.com/spreadsheets/d/${match[1]}/export?format=xlsx`;
      }
    }

    /* =========================
    DROPBOX
    ========================= */

    else if(source === 'dropbox'){

      url =
        url.replace('?dl=0','?dl=1');
    }

    /* =========================
    ONEDRIVE
    ========================= */

    else if(source === 'onedrive'){

      url =
        'https://corsproxy.io/?' +
        encodeURIComponent(url);
    }

    /* =========================
    EXCEL CLOUD API
    ========================= */

    else if(source === 'excelcloud'){

      const res = await fetch(url);

      if(!res.ok){

        throw new Error(
          'โหลด API ไม่สำเร็จ'
        );
      }

      const json = await res.json();

      if(!Array.isArray(json)){

        throw new Error(
          'API ต้องส่ง Array'
        );
      }

      store.rows = json;

      store.headers =
        Object.keys(json[0] || {});

      saveData();

      renderTable();

      hideLoading();

      alert('โหลดข้อมูล API สำเร็จ');

      return;
    }

    /* =========================
    XLSX
    ========================= */

    const res = await fetch(url);

    if(!res.ok){

      throw new Error(
        'โหลดไฟล์ไม่สำเร็จ'
      );
    }

    const buffer =
      await res.arrayBuffer();

    const workbook =
      XLSX.read(buffer,{
        type:'array'
      });

    let rows = [];

    let headers = [];

    workbook.SheetNames.forEach(sheetName=>{

      const ws =
        workbook.Sheets[sheetName];

      const json =
        XLSX.utils.sheet_to_json(ws,{
          defval:''
        });

      if(json.length){

        rows.push(...json);

        Object.keys(json[0]).forEach(h=>{

          if(!headers.includes(h)){

            headers.push(h);
          }
        });
      }
    });

    store.rows = rows;

    store.headers = headers;

    saveData();

    renderTable();

    hideLoading();

    alert('โหลดข้อมูลสำเร็จ');

  }catch(err){

    console.error(err);

    hideLoading();

    alert(
      'เกิดข้อผิดพลาด: ' + err.message
    );
  }
}

/* =========================
EXPORT
========================= */

function exportExcel(){

  if(!store.rows.length){

    alert('ไม่มีข้อมูล');

    return;
  }

  const ws =
    XLSX.utils.json_to_sheet(store.rows);

  const wb =
    XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(
    wb,
    ws,
    'Data'
  );

  XLSX.writeFile(
    wb,
    'excel-cloud-export.xlsx'
  );
}

/* =========================
CLEAR
========================= */

function clearData(){

  if(!confirm('ล้างข้อมูลทั้งหมด ?')){
    return;
  }

  store.rows = [];
  store.headers = [];

  localStorage.removeItem(
    'excel_cloud_rows'
  );

  localStorage.removeItem(
    'excel_cloud_headers'
  );

  renderTable();
}

/* =========================
AUTO LOAD
========================= */

window.addEventListener('load',()=>{

  loadSaved();
});

</script>

</body>
</html>
